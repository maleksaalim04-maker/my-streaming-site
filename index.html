<!DOCTYPE html>
<html>
<head>
  <title>My Streaming Site</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <h2>Welcome to My Streaming Website</h2>
  <p>Paste your video link below:</p>
  
  <input type="text" id="videoLink" placeholder="Enter direct video link">
  <button onclick="playVideo()">Play Video</button>
  
  <div id="player" style="margin-top:20px;"></div>

  <script>
    function playVideo() {
      const link = document.getElementById('videoLink').value;
      const playerDiv = document.getElementById('player');
      playerDiv.innerHTML = `<video width="100%" height="auto" controls autoplay>
                                <source src="${link}" type="video/mp4">
                                Your browser does not support the video tag.
                             </video>`;
    }
  </script>
</body>
</html>
